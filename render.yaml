services:
  - type: web
    name: ai-resume-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python db_import.py && gunicorn run:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:////data/resume_shortlister.db
      - key: UPLOAD_FOLDER
        value: /data/resumes
    disk:
      name: app-data
      mountPath: /data
      sizeGB: 1
