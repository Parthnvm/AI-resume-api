{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-10rem)] py-4">
<div class="w-full max-w-md fade-in">

    <div class="bg-white/80 dark:bg-slate-800/90 backdrop-blur-sm rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 overflow-hidden">

        <!-- Header band -->
        <div class="bg-gradient-to-r from-brand-600 to-indigo-700 px-8 py-7 text-white">
            <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center mb-4">
                <i class="fa-solid fa-lock-open text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold">Set New Password</h1>
            <p class="text-indigo-100 text-sm mt-1 leading-relaxed">
                Choose a strong password — at least 8 characters.
            </p>
        </div>

        <!-- Form -->
        <div class="px-8 py-8">
            <form action="{{ url_for('auth_bp.reset_password', token=token) }}" method="POST"
                  class="space-y-5" id="resetForm">
                <input type="hidden" name="token" value="{{ token }}">

                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">
                        New Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <input type="password" name="password" id="pw1" required autofocus minlength="8"
                               placeholder="At least 8 characters"
                               class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:bg-white dark:focus:bg-slate-600 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">
                        Confirm Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <input type="password" name="confirm_password" id="pw2" required minlength="8"
                               placeholder="Repeat your new password"
                               class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:bg-white dark:focus:bg-slate-600 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors">
                    </div>
                    <p id="matchError" class="mt-1.5 text-xs text-red-500 hidden">Passwords do not match.</p>
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full flex justify-center items-center py-2.5 px-4 rounded-lg shadow-sm shadow-brand-500/30 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
                    Reset Password <i class="fa-solid fa-check ml-2 text-xs"></i>
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
                <a href="{{ url_for('auth_bp.forgot_password') }}" class="text-brand-600 dark:text-brand-400 font-semibold hover:underline">
                    <i class="fa-solid fa-arrow-left text-xs mr-1"></i> Request a new link
                </a>
            </p>
        </div>
    </div>

</div>
</div>

<script>
    const pw1 = document.getElementById('pw1');
    const pw2 = document.getElementById('pw2');
    const matchError = document.getElementById('matchError');
    const submitBtn = document.getElementById('submitBtn');

    function validate() {
        const mismatch = pw2.value.length > 0 && pw1.value !== pw2.value;
        matchError.classList.toggle('hidden', !mismatch);
        submitBtn.disabled = mismatch;
    }

    pw1.addEventListener('input', validate);
    pw2.addEventListener('input', validate);

    document.getElementById('resetForm').addEventListener('submit', function(e) {
        if (pw1.value !== pw2.value) {
            e.preventDefault();
            validate();
        }
    });
</script>
{% endblock %}
