{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-10rem)] py-4">
<div class="w-full max-w-md fade-in">

    <div class="bg-white/80 dark:bg-slate-800/90 backdrop-blur-sm rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 overflow-hidden">

        <!-- Header band -->
        <div class="bg-gradient-to-r from-brand-600 to-indigo-700 px-8 py-7 text-white">
            <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center mb-4">
                <i class="fa-solid fa-key text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold">Forgot Password?</h1>
            <p class="text-indigo-100 text-sm mt-1 leading-relaxed">
                No worries. Enter your account email and we'll send you a reset link.
            </p>
        </div>

        <!-- Form -->
        <div class="px-8 py-8">
            <form action="{{ url_for('auth_bp.forgot_password') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">
                        Email Address
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <input type="email" name="email" required autofocus
                               placeholder="you@company.com"
                               class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:bg-white dark:focus:bg-slate-600 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors">
                    </div>
                </div>

                <button type="submit"
                        class="w-full flex justify-center items-center py-2.5 px-4 rounded-lg shadow-sm shadow-brand-500/30 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all active:scale-[0.98]">
                    Send Reset Link <i class="fa-solid fa-paper-plane ml-2 text-xs"></i>
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
                Remembered it?
                <a href="{{ url_for('auth_bp.auth') }}" class="text-brand-600 dark:text-brand-400 font-semibold hover:underline">
                    Sign In
                </a>
            </p>
        </div>
    </div>

</div>
</div>
{% endblock %}
