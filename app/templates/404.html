{% extends "base.html" %}
{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center py-16">
    <div class="w-24 h-24 rounded-3xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-white shadow-xl shadow-orange-300/30 mb-8">
        <i class="fa-solid fa-map text-4xl"></i>
    </div>
    <h1 class="text-6xl font-black text-slate-800 dark:text-slate-100 mb-3">404</h1>
    <p class="text-xl font-semibold text-slate-600 dark:text-slate-300 mb-2">Page Not Found</p>
    <p class="text-slate-500 dark:text-slate-400 mb-10 max-w-md">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="{{ url_for('auth_bp.index') }}"
       class="btn inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-semibold shadow-lg shadow-brand-500/25 transition-all">
        <i class="fa-solid fa-house"></i> Back to Home
    </a>
</div>
{% endblock %}
