# /etc/nginx/sites-available/smarthire
# Nginx reverse proxy config for AI Resume API on Oracle Cloud.
# Place at: /etc/nginx/sites-available/smarthire
# Enable with: sudo ln -s /etc/nginx/sites-available/smarthire /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;   # Accepts connections on any hostname / IP

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Upload size limit (match Flask MAX_CONTENT_LENGTH = 16 MB) ──────────
    client_max_body_size 20M;

    # ── Static files served directly by nginx (faster than gunicorn) ────────
    location /static/ {
        alias /opt/smarthire/app/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # ── All other requests proxied to gunicorn ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Health check endpoint (no logs to avoid noise) ───────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
