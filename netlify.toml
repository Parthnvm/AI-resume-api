[build]
  base = "analytic-frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NETLIFY = "true"

# API Proxying - Replace the 'to' URL with your actual backend URL (e.g. Render/Heroku)
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/hr/api/*"
  to = "https://your-backend-url.onrender.com/hr/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/student/api/*"
  to = "https://your-backend-url.onrender.com/student/api/:splat"
  status = 200
  force = true

# Fallback routing for React SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
